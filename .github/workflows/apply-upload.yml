name: Apply prepared logging update

on:
  push:
    branches:
      - agent/extended-logging
    paths:
      - .github/workflows/apply-upload.yml

permissions:
  contents: write

jobs:
  apply-update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/extended-logging
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Reconstruct and verify patch
        shell: bash
        run: |
          set -euo pipefail
          cat .upload/extended_logging.patch.xz.part* > /tmp/extended_logging.patch.xz.b64
          base64 --decode /tmp/extended_logging.patch.xz.b64 > /tmp/extended_logging.patch.xz
          echo "ac4d59c9528179619b4bc7a0bd66f9309921b5d638e3c9f89ad65582712ded42  /tmp/extended_logging.patch.xz" | sha256sum --check --strict
          xz --decompress --stdout /tmp/extended_logging.patch.xz > /tmp/extended_logging.patch
          git apply --check /tmp/extended_logging.patch
          git apply /tmp/extended_logging.patch

      - name: Remove temporary upload files
        shell: bash
        run: |
          rm -rf .upload
          rm -f .github/workflows/apply-upload.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true

      - name: Synchronize dependencies
        run: uv sync --locked --default-index https://pypi.org/simple

      - name: Run checks
        shell: bash
        run: |
          uv run python -m py_compile ollama_gui_chat.py
          uv run python -m unittest discover -s tests -v
          uv run ruff check .

      - name: Commit final project files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add extended logging and diagnostics"
          git push origin HEAD:agent/extended-logging
